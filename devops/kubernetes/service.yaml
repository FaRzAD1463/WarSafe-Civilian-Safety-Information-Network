apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector:
    app: warsafe-backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: NodePort
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
spec:
  selector:
    app: warsafe-ai
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: NodePort
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  selector:
    app: warsafe-postgres
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
  type: ClusterIP
