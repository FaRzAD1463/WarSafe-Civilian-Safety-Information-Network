apiVersion: apps/v1
kind: Deployment
metadata:
  name: warsafe-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: warsafe-backend
  template:
    metadata:
      labels:
        app: warsafe-backend
    spec:
      containers:
        - name: backend
          image: warsafe-backend:latest
          ports:
            - containerPort: 5000
          env:
            - name: ConnectionStrings__DefaultConnection
              value: Host=postgres;Port=5432;Database=warsafe;Username=postgres;Password=postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: warsafe-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: warsafe-ai
  template:
    metadata:
      labels:
        app: warsafe-ai
    spec:
      containers:
        - name: ai
          image: warsafe-ai:latest
          ports:
            - containerPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: warsafe-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: warsafe-postgres
  template:
    metadata:
      labels:
        app: warsafe-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15
          env:
            - name: POSTGRES_DB
              value: warsafe
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: postgres
          ports:
            - containerPort: 5432
