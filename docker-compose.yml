version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: warsafe_db
    restart: always
    environment:
      POSTGRES_DB: warsafe
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build:
      context: .
      dockerfile: devops/docker/backend.Dockerfile
    container_name: warsafe_backend
    depends_on:
      - postgres
    environment:
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=warsafe;Username=postgres;Password=postgres
    ports:
      - "5000:5000"

  ai:
    build:
      context: .
      dockerfile: devops/docker/ai.Dockerfile
    container_name: warsafe_ai
    ports:
      - "8000:8000"

  nginx:
    image: nginx:latest
    container_name: warsafe_nginx
    ports:
      - "80:80"
    volumes:
      - ./devops/nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend
      - ai

volumes:
  db_data:
